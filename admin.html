<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>School ERP</h2>

        <ul>
            <li onclick="showSection('home')">🏠 Home</li>
            <li onclick="showSection('students')">🎓 Students</li>
            <li onclick="showSection('teachers')">👩‍🏫 Teachers</li>
            <li onclick="showSection('attendance')">📊 Attendance</li>
            <li onclick="logout()">🚪 Logout</li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">

        <div id="home" class="section active">
            <h1>Welcome Admin</h1>
            <p>Manage your school system from here.</p>
        </div>

        <div id="students" class="section">
    <h1>Students</h1>

    <div class="card">
        <input type="text" id="stuName" placeholder="Student Name">
        <input type="text" id="stuClass" placeholder="Class">
        <button onclick="addStudent()">Add Student</button>
    </div>

    <h3>Student List</h3>
    <div id="studentList"></div>
</div>

        <div id="teachers" class="section">
            <h1>Teachers</h1>
            <p>Teacher module will go here.</p>
        </div>

        <div id="attendance" class="section">
    <h1>Attendance</h1>

    <div class="card">
        <input type="date" id="attDate">
        <button onclick="loadAttendance()">Load Students</button>
    </div>

    <div id="attendanceList"></div>
    <button onclick="saveAttendance()">Save Attendance</button>
</div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
